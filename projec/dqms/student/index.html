<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Student Portal | Registration & DQMS Lookup</title>
    <style>
        /* ========== GLOBAL RESET & TYPOGRAPHY ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e9f0fc 0%, #d9e4f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* main card container */
        .dashboard {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
        }

        /* Glassmorphism card */
        .card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card:hover {
            transform: translateY(-3px);
        }

        /* header branding */
        .hero {
            background: #0a2b3e;
            padding: 1.8rem 2rem;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero h1 span {
            background: #ffb347;
            font-size: 1rem;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            color: #0a2b3e;
            font-weight: 500;
        }

        .hero p {
            margin-top: 0.5rem;
            opacity: 0.85;
            font-size: 0.95rem;
        }

        /* form section */
        .form-section {
            padding: 2rem 2rem 1.5rem 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 600;
            color: #1e2f3e;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            font-style: normal;
            font-weight: 500;
            background: #eef2fa;
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.8rem;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            color: #0f172a;
            font-weight: 500;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .input-field::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* button */
        .lookup-btn {
            background: #0f3b5c;
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 2rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 0.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .lookup-btn:hover {
            background: #1e4a6e;
            transform: scale(0.98);
            box-shadow: 0 6px 14px rgba(15, 59, 92, 0.25);
        }

        .lookup-btn:active {
            transform: scale(0.96);
        }

        /* result card styling */
        .result-card {
            margin: 0 2rem 2rem 2rem;
            background: #f8fafd;
            border-radius: 1.8rem;
            padding: 1.5rem;
            border-left: 5px solid #ffb347;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.2rem;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 0.6rem;
        }

        .result-header .badge {
            background: #0f3b5c;
            color: white;
            border-radius: 60px;
            padding: 0.2rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .result-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0f172a;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e9eef3;
        }

        .info-label {
            font-weight: 600;
            color: #334155;
            font-size: 0.9rem;
            letter-spacing: 0.2px;
        }

        .info-value {
            font-weight: 700;
            color: #0f172a;
            background: #ffffffd0;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 1rem;
        }

        .dqms-highlight {
            background: #ffedd5;
            color: #b45309;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-family: monospace;
            font-weight: 800;
        }

        /* queue status card */
        .queue-card {
            margin: 0 2rem 1.5rem 2rem;
            background: linear-gradient(135deg, #0f3b5c 0%, #1e5a8a 100%);
            border-radius: 1.8rem;
            padding: 1.4rem 1.6rem;
            color: white;
            box-shadow: 0 8px 20px rgba(15,59,92,0.25);
        }

        .queue-card-title {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.75;
            margin-bottom: 1rem;
        }

        .queue-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .queue-stat {
            flex: 1;
            min-width: 100px;
            background: rgba(255,255,255,0.12);
            border-radius: 1.2rem;
            padding: 0.9rem 1rem;
            text-align: center;
        }

        .queue-stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
        }

        .queue-stat-label {
            font-size: 0.75rem;
            opacity: 0.75;
            margin-top: 4px;
        }

        .ticket-badge {
            display: inline-block;
            background: #ffb347;
            color: #0a2b3e;
            font-size: 1.8rem;
            font-weight: 800;
            padding: 0.2rem 1rem;
            border-radius: 0.8rem;
            font-family: monospace;
            line-height: 1.4;
        }

        .queue-status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        .dot-active { background: #4ade80; }
        .dot-none   { background: #94a3b8; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 1rem;
            border-radius: 1.4rem;
            font-weight: 500;
            margin: 0 2rem 2rem 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #ef4444;
        }

        .hidden {
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            padding: 1rem 2rem 1.5rem;
            font-size: 0.75rem;
            color: #4a627a;
            border-top: 1px solid #e2edf7;
            margin-top: 0.5rem;
        }

        @media (max-width: 500px) {
            .form-section, .result-card {
                padding-left: 1.2rem;
                padding-right: 1.2rem;
            }
            .hero h1 {
                font-size: 1.4rem;
            }
            .info-row {
                flex-direction: column;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="card">
        <div class="hero">
            <h1>
                📘 Student DQMS
                <span>verify & connect</span>
            </h1>
            <p>Enter registration number & phone number to retrieve your details</p>
        </div>
        <div class="form-section">
            <div class="input-group">
                <label><i>🎓</i> Registration Number</label>
                <input type="text" id="regNumber" class="input-field" placeholder="e.g., STU-2024-001 or 22CS101" autocomplete="off">
            </div>
            <div class="input-group">
                <label><i>📞</i> Phone Number</label>
                <input type="tel" id="phoneNumber" class="input-field" placeholder="e.g., +254712345678 or 0712345678" autocomplete="off">
            </div>
            <button id="lookupBtn" class="lookup-btn">
                🔍 Verify & Show Details
            </button>
        </div>

        <!-- dynamic result panel (hidden by default) -->
        <div id="resultContainer" class="hidden"></div>
        <div id="queueContainer" class="hidden"></div>
        <div id="errorContainer" class="hidden"></div>
        <div class="footer-note">
            🔒 Secure validation · DQMS assignment number appears after successful match
        </div>
    </div>
</div>

<script>
    const API_ENDPOINT   = 'http://localhost:3000/api/student/lookup';
    const API_BASE       = 'http://localhost:3000/api';

    const regInput        = document.getElementById('regNumber');
    const phoneInput      = document.getElementById('phoneNumber');
    const lookupBtn       = document.getElementById('lookupBtn');
    const resultContainer = document.getElementById('resultContainer');
    const queueContainer  = document.getElementById('queueContainer');
    const errorContainer  = document.getElementById('errorContainer');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function setLoading(on) {
        lookupBtn.disabled = on;
        lookupBtn.innerHTML = on ? `<span class="loading-spinner"></span> Verifying...` : `🔍 Verify & Show Details`;
    }

    function displayStudentInfo(s) {
        errorContainer.classList.add('hidden');
        resultContainer.innerHTML = `
            <div class="result-card">
                <div class="result-header">
                    <div class="badge">✓ verified</div>
                    <h3>📋 Student details</h3>
                </div>
                <div class="info-row">
                    <span class="info-label">🎓 Full Name</span>
                    <span class="info-value">${escapeHtml(s.name)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">📌 Registration Number</span>
                    <span class="info-value">${escapeHtml(s.registrationNumber)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">📞 Phone Number</span>
                    <span class="info-value">${escapeHtml(s.phoneNumber)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">⚙️ DQMS Assignment Number</span>
                    <span class="info-value dqms-highlight">${escapeHtml(s.dqmsNumber)}</span>
                </div>
                <div style="margin-top:12px;font-size:0.8rem;color:#2c5f8a;text-align:right;">✔️ official record</div>
            </div>`;
        resultContainer.classList.remove('hidden');
        resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function loadQueueStatus(dqmsNumber, phoneNumber) {
        try {
            const res  = await fetch(`${API_BASE}/queue-info/${encodeURIComponent(dqmsNumber)}`);
            const json = await res.json();
            const d    = json?.data;

            if (!d?.active_ticket) {
                queueContainer.innerHTML = `
                    <div class="queue-card">
                        <div class="queue-card-title">🎫 Queue Status — <span style="opacity:.7;font-weight:400;text-transform:none">${d?.office_name || ''}</span></div>
                        <div style="text-align:center;opacity:0.6;padding:1rem 0;font-size:0.9rem">
                            <span class="queue-status-dot dot-none"></span>No active ticket in queue
                        </div>
                    </div>`;
                queueContainer.classList.remove('hidden');
                return;
            }

            const t          = d.active_ticket;
            const isCalled   = t.status === 'called';
            const statusText = isCalled ? '🔔 Being called now!' : 'Waiting in queue';
            const dotClass   = 'dot-active';
            const waitLabel  = d.expected_wait_minutes === 0
                ? 'Up next!'
                : `~${d.expected_wait_minutes} min`;

            queueContainer.innerHTML = `
                <div class="queue-card">
                    <div class="queue-card-title">🎫 Queue Status — <span style="opacity:.7;font-weight:400;text-transform:none">${d.office_name || ''}</span></div>
                    <div class="queue-stats">
                        <div class="queue-stat">
                            <div class="queue-stat-value">
                                <span class="ticket-badge">#${String(t.ticket_number).padStart(3,'0')}</span>
                            </div>
                            <div class="queue-stat-label"><span class="queue-status-dot ${dotClass}"></span>${statusText}</div>
                        </div>
                        <div class="queue-stat">
                            <div class="queue-stat-value">${d.now_serving !== null ? String(d.now_serving).padStart(3,'0') : '—'}</div>
                            <div class="queue-stat-label">Now Serving</div>
                        </div>
                        <div class="queue-stat">
                            <div class="queue-stat-value">${d.waiting_total}</div>
                            <div class="queue-stat-label">In Queue</div>
                        </div>
                        <div class="queue-stat">
                            <div class="queue-stat-value" style="font-size:1.2rem">${waitLabel}</div>
                            <div class="queue-stat-label">Est. Wait</div>
                        </div>
                    </div>
                </div>`;
            queueContainer.classList.remove('hidden');
        } catch (e) {
            queueContainer.classList.add('hidden');
        }
    }

    function displayError(msg) {
        resultContainer.classList.add('hidden');
        errorContainer.innerHTML = `<div class="error-message"><span>⚠️</span><span>${escapeHtml(msg)}</span></div>`;
        errorContainer.classList.remove('hidden');
    }

    async function handleLookup() {
        const registrationNumber = regInput.value.trim();
        const phoneNumber        = phoneInput.value.trim();

        if (!registrationNumber) { displayError('Please enter your Registration Number.'); return; }
        if (!phoneNumber)        { displayError('Please enter your Phone Number.'); return; }

        resultContainer.classList.add('hidden');
        queueContainer.classList.add('hidden');
        errorContainer.classList.add('hidden');
        setLoading(true);

        try {
            const res = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ registrationNumber, phoneNumber })
            });
            const result = await res.json();
            if (!res.ok || !result.success) throw new Error(result.message || 'No matching student found.');
            displayStudentInfo(result.data);
            currentDQMS  = result.data.dqmsNumber;
            currentPhone = result.data.phoneNumber;
            loadQueueStatus(result.data.dqmsNumber, result.data.phoneNumber);
        } catch (err) {
            displayError(err.message || 'Unable to connect to server. Please try again.');
        } finally {
            setLoading(false);
        }
    }

    lookupBtn.addEventListener('click', handleLookup);
    [regInput, phoneInput].forEach(el => el.addEventListener('keypress', e => {
        if (e.key === 'Enter') { e.preventDefault(); handleLookup(); }
    }));

    // ── WebSocket: refresh queue status in real-time after each serve ──
    let currentDQMS = null;
    let currentPhone = null;
    let wsRetryTimer = null;

    function connectWS() {
        const ws = new WebSocket('ws://localhost:3000/ws');

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                // Refresh queue status whenever any ticket is served or called
                if (currentDQMS && (msg.type === 'ticket_served' || msg.type === 'ticket_called' || msg.type === 'queue_update')) {
                    loadQueueStatus(currentDQMS, currentPhone);
                }
            } catch(e) {}
        };

        ws.onclose = () => {
            // Reconnect after 5s
            wsRetryTimer = setTimeout(connectWS, 5000);
        };

        ws.onerror = () => ws.close();
    }

    connectWS();
</script>
</body>
</html>
